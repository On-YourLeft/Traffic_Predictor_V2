name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 🚀 Checkout Source Code
      uses: actions/checkout@v4 # Upgraded to v4 to silence Node.js warnings

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5 # Upgraded to v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🏗️ Set up Docker Buildx
      uses: docker/setup-buildx-action@v3 # THIS IS THE FIX: Initializes the advanced builder for caching

    - name: 🐳 Login to Docker Hub
      uses: docker/login-action@v3 # Upgraded to v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 🛠️ Build and Push Docker Image
      uses: docker/build-push-action@v5 # Upgraded to v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/traffic-predictor-v2:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/traffic-predictor-v2:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/traffic-predictor-v2:buildcache,mode=max

    - name: 🌍 Trigger Render Deployment
      run: |
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}